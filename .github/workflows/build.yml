name: Build FitTamil APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - run: npm install
      - run: npx cap add android
      - run: npx cap sync android
      - name: Network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<network-security-config>\n  <base-config cleartextTrafficPermitted="true">\n    <trust-anchors><certificates src="system"/></trust-anchors>\n  </base-config>\n</network-security-config>' > android/app/src/main/res/xml/network_security_config.xml
      - name: Patch manifest
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q 'INTERNET' $M || sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/><application|' $M
          sed -i 's|<application |<application android:networkSecurityConfig="@xml/network_security_config" android:usesCleartextTraffic="true" |' $M
      - run: chmod +x android/gradlew
      - run: cd android && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: FitTamil-AI-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30