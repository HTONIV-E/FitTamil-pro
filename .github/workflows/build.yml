name: Build FitTamil APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install Node dependencies
        run: npm install

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Copy web assets to Android
        run: npx cap sync android

      - name: Write network_security_config.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<network-security-config>
  <base-config cleartextTrafficPermitted="true">
    <trust-anchors>
      <certificates src="system"/>
      <certificates src="user"/>
    </trust-anchors>
  </base-config>
  <domain-config cleartextTrafficPermitted="false">
    <domain includeSubdomains="true">generativelanguage.googleapis.com</domain>
    <trust-anchors>
      <certificates src="system"/>
    </trust-anchors>
  </domain-config>
</network-security-config>
XMLEOF

      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q 'INTERNET' "$MANIFEST" || sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' "$MANIFEST"
          grep -q 'ACCESS_NETWORK_STATE' "$MANIFEST" || sed -i 's|<application|<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <application|' "$MANIFEST"
          sed -i 's|<application\b|<application android:networkSecurityConfig="@xml/network_security_config" android:usesCleartextTraffic="true"|' "$MANIFEST"
          echo "=== AndroidManifest.xml ==="
          cat "$MANIFEST"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitTamil-AI-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30